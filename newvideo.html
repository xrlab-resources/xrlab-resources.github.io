<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRLab Video Generator</title>
    <style>
        h2 { color: #2ea0e6; font-weight: 100; font-size: 2.3em; font-family: "Segoe UI Semilight", sans-serif; text-align: center; }
        .form-container { max-width: 90%; margin: 20px auto; background-color: #eeeeee; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .form-group { display: flex; margin-bottom: 10px; align-items: flex-start; }
        .form-group label { flex: 1; margin-right: 10px; text-align: right; font-weight: bold; margin-top: 5px; font-family: Arial, sans-serif; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group div { flex: 10; }
        .form-group select { width: 100%; padding: 5px; }
        .button-group { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        button { padding: 8px 15px; background-color: #007bff; color: #fff; border: none; cursor: pointer; border-radius: 10px; box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.1); }
        .blink { background-color: #f0f8ff; transition: background-color 0.2s ease; }
        .checkbox-group div { display: inline-block; margin-right: 15px; vertical-align: middle; }
        .checkbox-group label { font-weight: normal !important; margin-left: 4px; }
    </style>
</head>
<body>
    <h2>XRLab Video Generator</h2>
    <div class="form-container">
        <form id="videoform">
            <div class="form-group"><label for="title">Title:</label><input type="text" id="title" name="title" required></div>
            
            <div class="form-group">
                <label for="type">Type:</label>
                <div>
                    <select id="type" name="type">
                        <option value="tech">Tech</option>
                        <option value="tech promo">Tech Promo</option>
                        <option value="project promo">Project Promo</option>
                        <option value="event promo">Event Promo</option>
                        <option value="promo">Promo</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="category">Category:</label>
                <div>
                    <select id="category" name="category">
                        <option value="">(Select a category)</option>
                        <option value="Technology">Technology</option>
                        <option value="Projects">Projects</option>
                        <option value="Events">Events</option>
                        <option value="DRoom">DRoom</option>
                        <option value="The Owl">The Owl</option>
                        <option value="FJ23">FJ23</option>
                        <option value="Team">Team</option>
                        <option value="XR Offloading">XR Offloading</option>
                        <option value="Other">Other</option>
                        <option value="unedited">unedited</option>
                    </select>
                </div>
            </div>

            <div class="form-group"><label for="date">Date:</label><input type="text" id="date" name="date" placeholder="May2024" required></div>
            <div class="form-group"><label for="duration">Duration:</label><input type="text" id="duration" name="duration" placeholder="MM:SS"></div>
            <div class="form-group"><label for="photo">Photo:</label><input type="text" id="photo" name="photo" placeholder="URL or path"></div>
            <div class="form-group"><label for="description">Description:</label><textarea id="description" name="description" rows="4" required></textarea></div>
            <div class="form-group"><label for="links">Links:</label><textarea id="links" name="links" rows="2" placeholder="Name URL"></textarea></div>
            
            <div class="form-group">
                <label>Tags:</label>
                <div id="checkbox-group" class="checkbox-group"></div>
            </div>
            <div class="form-group"><label for="othertags">Custom Tags:</label><textarea id="othertags" name="othertags" rows="1"></textarea></div>

            <div class="button-group">
                <button type="button" id="submitBtn" onclick="submitVideo()">Add to videos list</button>
                <button type="button" onclick="generateJSON(1)">Copy video to clipboard</button>
                <button type="button" onclick="openDepot()">Open Depot</button>
                <button type="button" onclick="cleanForm()">Clean Form</button>
            </div>
        </form>
    </div>

<script>
    var jsonArray = [];
    var videoid = null;
    const defaultTags = ['talk', 'ext', 'tech', 'demo', 'internal', 'draft', 'alvarov'];

    window.onload = () => {
        const group = document.getElementById('checkbox-group');
        defaultTags.forEach((tag, i) => {
            group.innerHTML += `<div><input type="checkbox" name="tags" value="${tag}" id="t${i}"><label for="t${i}">${tag}</label></div>`;
        });

        videoid = new URLSearchParams(window.location.search).get("id");
        fetch("/videos.json", { cache: 'no-cache' }).then(r => r.json()).then(data => {
            jsonArray = data;
            if (videoid) {
                let v = jsonArray.find(x => x.id === videoid);
                if (v) {
                    fillForm(v);
                    document.getElementById('submitBtn').textContent = 'Update video';
                }
            }
        });
    };

    function fillForm(obj) {
        for (var key in obj) {
            let val = obj[key];
            if (key == "tags") {
                let other = [];
                val.forEach(t => {
                    let cb = document.querySelector(`input[name="tags"][value="${t}"]`);
                    if (cb) cb.checked = true; else other.push(t);
                });
                document.getElementById("othertags").value = other.join(', ');
            } else if (key == "links") {
                document.getElementById("links").value = val.map(l => `${l.name} ${l.url}`).join('\n');
            } else {
                let el = document.getElementById(key);
                if (el) el.value = val;
            }
        }
    }

    function getProcessedData() {
        const form = document.getElementById('videoform');
        const formData = new FormData(form);
        const jsonData = {};
        let tags = [];

        formData.forEach((value, key) => {
            if (key === 'tags') tags.push(value);
            else if (key === 'othertags' && value) {
                tags = tags.concat(value.split(',').map(t => t.trim()).filter(t => t));
            } else if (key !== 'links') {
                jsonData[key] = value;
            }
        });

        jsonData['tags'] = tags;
        
        // --- GENERACIÓN DE ID ALFANUMÉRICO PURO (Sin espacios ni guiones) ---
        // Elimina cualquier cosa que no sea letra o número
        const cleanDate = (jsonData['date'] || "").replace(/[^a-z0-9]/gi, '');
        const cleanTitle = (jsonData['title'] || "").replace(/[^a-z0-9]/gi, '');
        jsonData['id'] = cleanDate + cleanTitle;

        const linksText = formData.get('links') || "";
        jsonData['links'] = linksText.split('\n').map(line => {
            const p = line.trim().split(/\s+/);
            if (p.length >= 2) {
                const url = p.pop();
                const name = p.join(" ");
                return { name, url };
            }
            return null;
        }).filter(l => l);

        return jsonData;
    }

    function submitVideo() {
        const data = getProcessedData();
        if (!data.title || !data.date) { alert('Title and Date required'); return; }

        const sendData = new FormData();
        for (let key in data) {
            if (key === 'tags') data.tags.forEach(t => sendData.append('tags', t));
            else if (key === 'links') {
                // Mantenemos el formato de texto para que parse_links en el server funcione
                sendData.append('links', document.getElementById('links').value);
            } else {
                sendData.append(key, data[key]);
            }
        }
        sendData.append('othertags', document.getElementById('othertags').value);

        fetch('/add_video', { method: 'POST', body: sendData })
        .then(r => r.json())
        .then(res => {
            if (res.success) {
                alert(res.message);
                if (videoid) window.location.href = '/videos';
                else location.reload();
            } else alert('Error: ' + res.error);
        });
    }

    function generateJSON(action) {
        const data = getProcessedData();
        const jsonString = JSON.stringify(data, null, 2) + ',';
        if (action === 1) {
            navigator.clipboard.writeText(jsonString).then(() => {
                document.getElementById("videoform").classList.add("blink");
                setTimeout(() => document.getElementById("videoform").classList.remove("blink"), 500);
            });
        }
    }

    function cleanForm() { location.href = window.location.pathname; }
    function openDepot() { window.open("https://nokia.sharepoint.com/sites/blspain/SiteAssets/SitePages/Videos", "_blank"); }
</script>
</body>
</html>
